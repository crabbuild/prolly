<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">10 million key Rust Prolly versus Go Prolly report</title>
  <desc id="desc">Corrected one-page benchmark report comparing Rust Prolly and Dolt Go Prolly at 10 million keys across point reads, full scans, and writes, using each implementation's native in-memory defaults.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#101b31"/>
    </linearGradient>
    <linearGradient id="rustGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff7a45"/>
      <stop offset="1" stop-color="#ffb454"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#28d7a1"/>
      <stop offset="1" stop-color="#67e8b9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <style>
      text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 48px; font-weight: 800; letter-spacing: -1.5px; fill: #f7fbff; }
      .subtitle { font-size: 20px; font-weight: 500; fill: #9fb0c9; }
      .section { font-size: 24px; font-weight: 750; fill: #f7fbff; }
      .smallcaps { font-size: 13px; font-weight: 800; letter-spacing: 1.6px; fill: #7f94b3; }
      .label { font-size: 16px; font-weight: 650; fill: #dce7f6; }
      .body { font-size: 15px; font-weight: 500; fill: #aebed3; }
      .tiny { font-size: 13px; font-weight: 500; fill: #899db9; }
      .number { font-size: 30px; font-weight: 800; fill: #f8fbff; }
      .speed { font-size: 18px; font-weight: 800; fill: #43dfad; }
      .raw-rust { font-size: 12px; font-weight: 700; fill: #ff9a62; }
      .raw-go { font-size: 12px; font-weight: 650; fill: #9fb0c9; }
      .mono { font-family: "SFMono-Regular", Consolas, monospace; }
    </style>
  </defs>

  <rect width="1800" height="1200" fill="url(#bg)"/>
  <circle cx="1450" cy="-120" r="520" fill="#14345b" opacity="0.28"/>
  <circle cx="90" cy="1130" r="340" fill="#173c45" opacity="0.20"/>

  <!-- Header -->
  <text id="titleText" x="60" y="78" class="smallcaps" fill="#ff9a62">CORRECTED · VERIFIED PERFORMANCE REPORT · 2026-07-17</text>
  <text x="60" y="132" class="title">10 MILLION KEYS: RUST PROLLY vs GO PROLLY</text>
  <text x="60" y="164" class="subtitle">Three-run medians · one worker · native in-memory defaults · identical logical records · lower ns/op is better</text>

  <g transform="translate(1428 48)" filter="url(#shadow)">
    <rect width="312" height="104" rx="18" fill="#102941" stroke="#2c5d78"/>
    <text x="24" y="31" class="smallcaps" fill="#70ebbc">10M RESULT</text>
    <text x="24" y="66" font-size="29" font-weight="850" fill="#f7fbff">18 / 18 RUST WINS</text>
    <text x="24" y="89" class="tiny">6 workloads × 3 operations</text>
  </g>

  <!-- Left performance panel -->
  <g filter="url(#shadow)">
    <rect x="50" y="195" width="810" height="770" rx="24" fill="#0d192b" stroke="#263850"/>
  </g>
  <text x="80" y="239" class="section">How both trees behave at 10M</text>
  <text x="80" y="266" class="body">Raw three-run medians plus Go/Rust speedup. Locality and mutation policy strongly affect the margin.</text>

  <!-- Table -->
  <rect x="75" y="292" width="760" height="50" rx="10" fill="#13243a"/>
  <text x="94" y="323" class="smallcaps">WORKLOAD</text>
  <text x="395" y="315" class="smallcaps" text-anchor="middle">WRITE</text>
  <text x="395" y="334" class="tiny" text-anchor="middle">R / G / G÷R</text>
  <text x="575" y="315" class="smallcaps" text-anchor="middle">POINT READ</text>
  <text x="575" y="334" class="tiny" text-anchor="middle">R / G / G÷R</text>
  <text x="750" y="315" class="smallcaps" text-anchor="middle">FULL SCAN</text>
  <text x="750" y="334" class="tiny" text-anchor="middle">R / G / G÷R</text>

  <g>
    <rect x="75" y="351" width="760" height="76" rx="8" fill="#101e31"/>
    <rect x="75" y="433" width="760" height="76" rx="8" fill="#0b1728"/>
    <rect x="75" y="515" width="760" height="76" rx="8" fill="#101e31"/>
