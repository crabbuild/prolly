    <rect x="83" y="610" width="5" height="50" rx="2" fill="#ff8b52"/>
    <rect x="83" y="692" width="5" height="50" rx="2" fill="#ff8b52"/>
    <rect x="83" y="774" width="5" height="50" rx="2" fill="#ff8b52"/>

    <text x="100" y="395" class="label">Fresh · append</text>
    <text x="100" y="477" class="label">Fresh · random</text>
    <text x="100" y="559" class="label">Fresh · clustered</text>
    <text x="100" y="641" class="label">Mutation · append</text>
    <text x="100" y="723" class="label">Mutation · random</text>
    <text x="100" y="805" class="label">Mutation · clustered</text>

    <!-- Fresh append: Rust ns/op, Dolt Go ns/op, then Go/Rust speedup -->
    <text x="395" y="373" class="raw-rust mono" text-anchor="middle">R 288.120</text>
    <text x="395" y="392" class="raw-go mono" text-anchor="middle">G 1,103.554</text>
    <text x="395" y="418" class="speed" text-anchor="middle">3.83×</text>
    <text x="575" y="373" class="raw-rust mono" text-anchor="middle">R 1,005.577</text>
    <text x="575" y="392" class="raw-go mono" text-anchor="middle">G 1,752.892</text>
    <text x="575" y="418" class="speed" text-anchor="middle">1.74×</text>
    <text x="750" y="373" class="raw-rust mono" text-anchor="middle">R 6.147</text>
    <text x="750" y="392" class="raw-go mono" text-anchor="middle">G 41.893</text>
    <text x="750" y="418" class="speed" text-anchor="middle">6.81×</text>

    <!-- Fresh random -->
    <text x="395" y="455" class="raw-rust mono" text-anchor="middle">R 797.042</text>
    <text x="395" y="474" class="raw-go mono" text-anchor="middle">G 7,042.339</text>
    <text x="395" y="500" class="speed" text-anchor="middle">8.84×</text>
    <text x="575" y="455" class="raw-rust mono" text-anchor="middle">R 1,004.131</text>
    <text x="575" y="474" class="raw-go mono" text-anchor="middle">G 1,824.231</text>
    <text x="575" y="500" class="speed" text-anchor="middle">1.82×</text>
    <text x="750" y="455" class="raw-rust mono" text-anchor="middle">R 6.069</text>
    <text x="750" y="474" class="raw-go mono" text-anchor="middle">G 45.452</text>
    <text x="750" y="500" class="speed" text-anchor="middle">7.49×</text>

    <!-- Fresh clustered -->
    <text x="395" y="537" class="raw-rust mono" text-anchor="middle">R 401.622</text>
    <text x="395" y="556" class="raw-go mono" text-anchor="middle">G 905.013</text>
    <text x="395" y="582" class="speed" text-anchor="middle">2.25×</text>
    <text x="575" y="537" class="raw-rust mono" text-anchor="middle">R 999.205</text>
    <text x="575" y="556" class="raw-go mono" text-anchor="middle">G 1,754.001</text>
    <text x="575" y="582" class="speed" text-anchor="middle">1.76×</text>
    <text x="750" y="537" class="raw-rust mono" text-anchor="middle">R 6.164</text>
    <text x="750" y="556" class="raw-go mono" text-anchor="middle">G 43.066</text>
    <text x="750" y="582" class="speed" text-anchor="middle">6.99×</text>

    <!-- Mutation append -->
    <text x="395" y="619" class="raw-rust mono" text-anchor="middle">R 285.527</text>
    <text x="395" y="638" class="raw-go mono" text-anchor="middle">G 1,153.290</text>
    <text x="395" y="664" class="speed" text-anchor="middle">4.04×</text>
    <text x="575" y="619" class="raw-rust mono" text-anchor="middle">R 137.864</text>
    <text x="575" y="638" class="raw-go mono" text-anchor="middle">G 549.286</text>
    <text x="575" y="664" class="speed" text-anchor="middle">3.98×</text>
    <text x="750" y="619" class="raw-rust mono" text-anchor="middle">R 6.475</text>
    <text x="750" y="638" class="raw-go mono" text-anchor="middle">G 41.809</text>
    <text x="750" y="664" class="speed" text-anchor="middle">6.46×</text>

    <!-- Mutation random -->
    <text x="395" y="701" class="raw-rust mono" text-anchor="middle">R 2,369.997</text>
    <text x="395" y="720" class="raw-go mono" text-anchor="middle">G 12,488.694</text>
    <text x="395" y="746" class="speed" text-anchor="middle">5.27×</text>
    <text x="575" y="701" class="raw-rust mono" text-anchor="middle">R 1,057.409</text>
    <text x="575" y="720" class="raw-go mono" text-anchor="middle">G 2,605.525</text>
    <text x="575" y="746" class="speed" text-anchor="middle">2.46×</text>
    <text x="750" y="701" class="raw-rust mono" text-anchor="middle">R 6.059</text>
    <text x="750" y="720" class="raw-go mono" text-anchor="middle">G 45.379</text>
    <text x="750" y="746" class="speed" text-anchor="middle">7.49×</text>

    <!-- Mutation clustered -->
    <text x="395" y="783" class="raw-rust mono" text-anchor="middle">R 501.991</text>
    <text x="395" y="802" class="raw-go mono" text-anchor="middle">G 784.166</text>
    <text x="395" y="828" class="speed" text-anchor="middle">1.56×</text>
    <text x="575" y="783" class="raw-rust mono" text-anchor="middle">R 117.961</text>
    <text x="575" y="802" class="raw-go mono" text-anchor="middle">G 551.524</text>
    <text x="575" y="828" class="speed" text-anchor="middle">4.68×</text>
    <text x="750" y="783" class="raw-rust mono" text-anchor="middle">R 6.899</text>
    <text x="750" y="802" class="raw-go mono" text-anchor="middle">G 42.319</text>
    <text x="750" y="828" class="speed" text-anchor="middle">6.13×</text>
  </g>

  <!-- Raw-data legend -->
  <rect x="75" y="853" width="760" height="79" rx="16" fill="#122139" stroke="#263e59"/>
  <text x="97" y="879" class="smallcaps">HOW TO READ EACH CELL · ALL RAW VALUES ARE MEDIAN ns/op</text>
  <text x="97" y="911" class="raw-rust mono">R</text>
  <text x="116" y="911" class="tiny">Rust</text>
  <text x="220" y="911" class="raw-go mono">G</text>
  <text x="239" y="911" class="tiny">Dolt Go</text>
  <text x="365" y="911" class="speed">G÷R</text>
  <text x="410" y="911" class="tiny">relative speedup; above 1× favors Rust</text>

  <!-- Right mechanism panel -->
  <g filter="url(#shadow)">
    <rect x="890" y="195" width="860" height="770" rx="24" fill="#0d192b" stroke="#263850"/>
  </g>
  <text x="920" y="239" class="section">Mechanisms in the measured Rust binary</text>
  <text x="920" y="266" class="body">Implemented together; this benchmark does not isolate each mechanism's individual contribution.</text>

  <g>
    <rect x="920" y="300" width="370" height="150" rx="18" fill="#122139" stroke="#36506e"/>
    <circle cx="951" cy="331" r="15" fill="url(#rustGlow)"/>
    <text x="981" y="338" class="label">1 · Packed immutable ReadNode</text>
    <text x="947" y="373" class="body">Retains encoded <tspan class="mono">Arc&lt;[u8]&gt;</tspan> once</text>
    <text x="947" y="400" class="body">Validated compact offsets borrow key/value slices</text>
    <text x="947" y="427" class="body">Prefix keys rebuild once into one contiguous arena</text>

    <rect x="1350" y="300" width="370" height="150" rx="18" fill="#122139" stroke="#36506e"/>
    <circle cx="1381" cy="331" r="15" fill="url(#greenGlow)"/>
    <text x="1411" y="338" class="label">2 · Less work per key comparison</text>
    <text x="1377" y="373" class="body">Common-prefix gate rejects out-of-range queries</text>
    <text x="1377" y="400" class="body">64-bit key-order word before full byte compare</text>
    <text x="1377" y="427" class="body">Binary search only dereferences bytes on ties</text>

    <path d="M1298 375 L1340 375" stroke="#4f6887" stroke-width="3"/>
    <path d="M1331 367 L1340 375 L1331 383" fill="none" stroke="#4f6887" stroke-width="3"/>

    <rect x="920" y="480" width="370" height="165" rx="18" fill="#122139" stroke="#36506e"/>
    <circle cx="951" cy="511" r="15" fill="url(#greenGlow)"/>
    <text x="981" y="518" class="label">3 · Bounded ReadSession locality</text>
    <text x="947" y="553" class="body">Root handle retained: no repeated root lookup</text>
    <text x="947" y="580" class="body">4,096-slot, 4-way internal route-node table</text>
    <text x="947" y="607" class="body">Recent-leaf shortcut for clustered keys</text>
    <text x="947" y="632" class="tiny">Adaptive: disabled after 8 misses on random access</text>

    <rect x="1350" y="480" width="370" height="165" rx="18" fill="#122139" stroke="#36506e"/>
    <circle cx="1381" cy="511" r="15" fill="url(#rustGlow)"/>
    <text x="1411" y="518" class="label">4 · Borrowed point and scan traversal</text>
    <text x="1377" y="553" class="body"><tspan class="mono">get_with</tspan> lends <tspan class="mono">&amp;[u8]</tspan> in callback scope</text>
    <text x="1377" y="580" class="body"><tspan class="mono">scan_range</tspan> emits borrowed <tspan class="mono">EntryRef</tspan></text>
    <text x="1377" y="607" class="body">Traversal stack retains nodes; no per-row clone</text>
    <text x="1377" y="632" class="tiny">Owned APIs clone only at compatibility boundaries</text>

    <path d="M1298 562 L1340 562" stroke="#4f6887" stroke-width="3"/>
    <path d="M1331 554 L1340 562 L1331 570" fill="none" stroke="#4f6887" stroke-width="3"/>
    <path d="M1105 458 L1105 470" stroke="#4f6887" stroke-width="3"/>
    <path d="M1097 462 L1105 470 L1113 462" fill="none" stroke="#4f6887" stroke-width="3"/>
    <path d="M1535 458 L1535 470" stroke="#4f6887" stroke-width="3"/>
    <path d="M1527 462 L1535 470 L1543 462" fill="none" stroke="#4f6887" stroke-width="3"/>
  </g>

  <!-- Corrected benchmark contract -->
  <rect x="920" y="675" width="800" height="92" rx="16" fill="#102b2d" stroke="#28605a"/>
  <text x="943" y="705" class="smallcaps" fill="#6ce9bb">CORRECTED BENCHMARK CONTRACT</text>
  <text x="943" y="735" class="body" fill="#c9eee2">Go uses Dolt's native ~65K pending-edit flush; the previous whole-workload override was removed.</text>
  <text x="943" y="758" class="tiny">All 18 Rust/Go contracts match. This measures native product paths—not language-runtime speed alone.</text>

  <!-- Pattern-to-behavior interpretation -->
  <rect x="920" y="792" width="800" height="140" rx="18" fill="#13243a" stroke="#36506e"/>
  <text x="943" y="824" class="smallcaps" fill="#8fb4dc">PATTERN → OBSERVED BEHAVIOR</text>
  <circle cx="948" cy="851" r="4" fill="#4bdda9"/>
  <text x="963" y="856" class="body">Full scans reach 6.13–7.49×: sequential retained-node traversal emits borrowed rows.</text>
  <circle cx="948" cy="879" r="4" fill="#4bdda9"/>
  <text x="963" y="884" class="body">Mutation append/clustered reads reach 3.98×/4.68×, consistent with session and leaf locality.</text>
  <circle cx="948" cy="907" r="4" fill="#ff9e8c"/>
  <text x="963" y="912" class="body">Fresh reads are 1.74–1.82×; mutation-random peak RSS is Rust 7.76 vs Go 19.64 GiB.</text>

  <!-- Workload glossary -->
  <rect x="50" y="995" width="1700" height="150" rx="22" fill="#101b2e" stroke="#2a3b54"/>
  <text x="78" y="1026" class="smallcaps">WORKLOAD PATTERN · IDENTICAL RUST/GO INPUT PER ROW, DIFFERENT ARRIVAL OR UPDATE ORDER</text>

  <rect x="75" y="1042" width="295" height="78" rx="13" fill="#13243a"/>
  <text x="94" y="1069" class="label">Fresh</text>
  <text x="94" y="1093" class="tiny">Build from empty to 10M final keys.</text>
  <text x="94" y="1112" class="tiny">All three orders end with identical records.</text>

  <rect x="385" y="1042" width="405" height="78" rx="13" fill="#2a2029"/>
  <text x="404" y="1069" class="label">Mutation</text>
  <text x="404" y="1093" class="tiny">Start at 10M, then apply 3M writes (30%).</text>
  <text x="404" y="1112" class="tiny">Random/clustered: 1.5M inserts + 1.5M updates.</text>

  <rect x="805" y="1042" width="285" height="78" rx="13" fill="#13243a"/>
  <text x="824" y="1069" class="label">Append</text>
  <text x="824" y="1093" class="tiny">Ascending fresh keys; mutation keys</text>
  <text x="824" y="1112" class="tiny">are all new and above the maximum.</text>

  <rect x="1105" y="1042" width="285" height="78" rx="13" fill="#13243a"/>
  <text x="1124" y="1069" class="label">Random</text>
  <text x="1124" y="1093" class="tiny">Deterministic global permutation:</text>
  <text x="1124" y="1112" class="tiny">minimal arrival-order locality.</text>

  <rect x="1405" y="1042" width="320" height="78" rx="13" fill="#13243a"/>
  <text x="1424" y="1069" class="label">Clustered</text>
  <text x="1424" y="1093" class="tiny">Permuted 1,000-key groups:</text>
  <text x="1424" y="1112" class="tiny">locality inside each shuffled cluster.</text>

  <text x="60" y="1180" class="tiny mono">Rust a757eb598d6c+src.460b1d1906bb · Dolt Go 9e80d3aa2cf8+runner.6bf12dc88bef · Apple M2 Max / 32 GiB</text>
  <text x="1740" y="1180" class="tiny" text-anchor="end">Source: dolt-rust-main-merged-repro-2026-07-17/report.md</text>
</svg>
